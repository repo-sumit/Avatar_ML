<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Avatar_ML — Phase 0 demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #fafafa;
      --fg: #222;
      --muted: #666;
      --border: #ddd;
      --accent: #2563eb;
      --accent-fg: #fff;
      --ok: #16a34a;
      --err: #b91c1c;
      --bar-bg: #eef2ff;
      --bar-fill: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 820px; margin: 24px auto; padding: 0 16px;
      color: var(--fg); background: var(--bg);
    }
    h1 { margin-bottom: 4px; }
    .sub { color: var(--muted); margin-top: 0; font-size: 14px; }
    .card {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 16px 20px; margin: 16px 0; background: #fff;
    }
    .card h2 {
      margin: 0 0 12px 0; font-size: 16px; color: var(--accent);
    }
    .row { display: flex; gap: 10px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    label { font-size: 14px; }
    select, input[type=text], input[type=file], textarea, button {
      font: inherit; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px;
    }
    select, input[type=text] { min-width: 280px; }
    textarea { width: 100%; min-height: 70px; resize: vertical; }
    button {
      cursor: pointer; background: var(--accent); color: var(--accent-fg);
      border-color: var(--accent); padding: 8px 14px;
    }
    button[disabled] { opacity: 0.5; cursor: not-allowed; }
    button.ghost { background: #fff; color: var(--accent); }
    .status { font-size: 13px; color: var(--muted); margin-top: 8px; min-height: 18px; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); white-space: pre-wrap; font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
    .bar {
      height: 14px; background: var(--bar-bg); border-radius: 7px; overflow: hidden;
      margin-top: 6px;
    }
    .bar > div { height: 100%; background: var(--bar-fill); width: 0%; transition: width 0.3s; }
    .stage { font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
    video { width: 100%; max-width: 640px; background: #000; border-radius: 6px; margin-top: 12px; }
    .hidden { display: none; }
    .pill {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 11px; background: #eee; color: #444; margin-left: 4px;
    }
    a { color: var(--accent); }
    .field-grid {
      display: grid; grid-template-columns: 80px 1fr; gap: 8px 10px; align-items: center;
      margin-top: 8px;
    }
    .field-grid > label { font-weight: 500; }
    fieldset {
      border: 1px dashed var(--border); border-radius: 6px; padding: 12px 16px;
      margin-top: 6px;
    }
    fieldset[disabled] { opacity: 0.45; }
    fieldset legend { font-size: 12px; color: var(--muted); padding: 0 6px; }
  </style>
</head>
<body>

<h1>Avatar_ML <span class="pill">Phase 0</span></h1>
<p class="sub">Type text, get a video of your cloned avatar saying it. Powered by OpenVoice V2 + MuseTalk on Colab.</p>

<!-- ─────────────────────────────────────────── 1. Profile (unified) -->
<div class="card">
  <h2>1. Profile</h2>
  <p class="sub" style="margin: 0 0 6px 0;">A profile is one person: a name + a voice sample + a face video. Re-usable for unlimited Generate calls.</p>

  <div class="row">
    <label><input type="radio" name="profile_mode" value="existing" checked /> Use existing</label>
    <select id="profile_select"></select>
    <button class="ghost" id="profile_refresh" type="button">↻</button>
  </div>

  <fieldset id="profile_new_box" disabled>
    <legend>Create new</legend>
    <div class="row">
      <label><input type="radio" name="profile_mode" value="create" /> Create new</label>
    </div>
    <div class="field-grid">
      <label>Name</label>
      <input type="text" id="profile_name" placeholder="e.g. Sumit" />
      <label>Voice</label>
      <input type="file" id="profile_audio" accept="audio/wav,audio/mpeg,audio/*" />
      <label>Face</label>
      <input type="file" id="profile_video" accept="video/mp4,video/quicktime,video/*" />
      <label></label>
      <div><button id="profile_create" type="button">Create profile</button></div>
    </div>
  </fieldset>

  <div class="status" id="profile_status"></div>
</div>

<!-- ─────────────────────────────────────────── 2. Generate -->
<div class="card">
  <h2>2. Generate video</h2>
  <textarea id="text" placeholder="Type what your avatar should say...">Hello, this is my AI avatar speaking in my cloned voice.</textarea>
  <div class="row">
    <button id="generate" type="button">Generate video</button>
    <span class="stage" id="stage_label">idle</span>
  </div>
  <div class="bar"><div id="bar_fill"></div></div>
  <div class="status" id="gen_status"></div>
  <video id="video" controls class="hidden"></video>
  <div class="row hidden" id="download_row">
    <a id="download_link" download>⬇ Download MP4</a>
  </div>
</div>

<script>
const API = location.origin;

function $(id) { return document.getElementById(id); }
async function jget(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`GET ${path} -> ${r.status} ${await r.text()}`);
  return r.json();
}
async function jpost(path, body) {
  const r = await fetch(API + path, {
    method: 'POST',
    headers: {'content-type': 'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`POST ${path} -> ${r.status} ${await r.text()}`);
  return r.json();
}
async function jpostForm(path, formData) {
  const r = await fetch(API + path, {method: 'POST', body: formData});
  if (!r.ok) throw new Error(`POST ${path} -> ${r.status} ${await r.text()}`);
  return r.json();
}
function setStatus(el, msg, kind) {
  el.className = 'status' + (kind ? ' ' + kind : '');
  el.textContent = msg;
}

// ─── profile radio toggle ───────────────────────────────────────────────────
document.querySelectorAll('input[name=profile_mode]').forEach(r => {
  r.addEventListener('change', updateProfileMode);
});
function updateProfileMode() {
  const mode = document.querySelector('input[name=profile_mode]:checked').value;
  $('profile_select').disabled  = mode !== 'existing';
  $('profile_refresh').disabled = mode !== 'existing';
  $('profile_new_box').disabled = mode !== 'create';
}

// ─── profile list ───────────────────────────────────────────────────────────
let profilesCache = [];
async function loadProfiles() {
  try {
    profilesCache = await jget('/api/profiles');
    const sel = $('profile_select');
    sel.innerHTML = '';
    if (!profilesCache.length) {
      const o = document.createElement('option');
      o.textContent = '(no profiles yet — create one below)';
      o.value = '';
      sel.appendChild(o);
      sel.disabled = true;
      // Switch to create mode by default if no profiles exist.
      document.querySelector('input[name=profile_mode][value=create]').checked = true;
      updateProfileMode();
    } else {
      for (const p of profilesCache) {
        const o = document.createElement('option');
        o.value = p.name;
        o.textContent = `${p.name}  —  ${p.voice_id} + ${p.avatar_id}`;
        sel.appendChild(o);
      }
      sel.disabled = false;
    }
  } catch (e) {
    setStatus($('profile_status'), e.message, 'err');
  }
}
$('profile_refresh').onclick = loadProfiles;

// ─── create profile flow ────────────────────────────────────────────────────
$('profile_create').onclick = async () => {
  const name  = $('profile_name').value.trim();
  const audio = $('profile_audio').files[0];
  const video = $('profile_video').files[0];
  if (!name)  { setStatus($('profile_status'), 'Enter a name.', 'err'); return; }
  if (!audio) { setStatus($('profile_status'), 'Pick a voice file (.wav/.mp3).', 'err'); return; }
  if (!video) { setStatus($('profile_status'), 'Pick a face video (.mp4).', 'err'); return; }

  $('profile_create').disabled = true;
  setStatus($('profile_status'),
    `Step 1/2: uploading voice → extracting speaker embedding (Colab lazy-load can take ~40s on first call)...`);

  const fd = new FormData();
  fd.append('name', name);
  fd.append('audio', audio);
  fd.append('video', video);

  // /api/profiles is a single request that internally does both steps; the
  // server prints progress in the Colab Cell 4 log. Browser just waits.
  try {
    setStatus($('profile_status'),
      `Creating "${name}"... voice embed (5–60s) then avatar preprocess (1–3 min). This blocks the browser; be patient.`);
    const r = await jpostForm('/api/profiles', fd);
    setStatus($('profile_status'),
      `Created profile "${r.name}" (${r.voice_id} + ${r.avatar_id}).`, 'ok');
    await loadProfiles();
    $('profile_select').value = r.name;
    document.querySelector('input[name=profile_mode][value=existing]').checked = true;
    updateProfileMode();
    // Clear inputs.
    $('profile_audio').value = '';
    $('profile_video').value = '';
  } catch (e) {
    setStatus($('profile_status'), e.message, 'err');
  } finally {
    $('profile_create').disabled = false;
  }
};

// ─── generate + progress polling ────────────────────────────────────────────
let pollTimer = null;

function selectedProfile() {
  const mode = document.querySelector('input[name=profile_mode]:checked').value;
  if (mode !== 'existing') return null;
  const name = $('profile_select').value;
  return profilesCache.find(p => p.name === name) || null;
}

function updateProgress(state) {
  $('stage_label').textContent =
    `${state.stage} ${state.frames_total ? `(${state.frames_done}/${state.frames_total} frames)` : ''} — ${state.elapsed_s}s`;
  $('bar_fill').style.width = state.progress + '%';

  if (state.stage === 'done') {
    setStatus($('gen_status'), `Done in ${state.elapsed_s}s.`, 'ok');
    const url = state.output_url;
    const vid = $('video');
    vid.src = url;
    vid.classList.remove('hidden');
    const dl = $('download_link');
    dl.href = url;
    dl.textContent = `⬇ Download MP4`;
    $('download_row').classList.remove('hidden');
    clearInterval(pollTimer); pollTimer = null;
    $('generate').disabled = false;
  } else if (state.stage === 'failed') {
    setStatus($('gen_status'), state.error || 'unknown error', 'err');
    clearInterval(pollTimer); pollTimer = null;
    $('generate').disabled = false;
  }
}

async function pollJob(jobId) {
  try {
    const state = await jget('/api/generate-video/' + jobId);
    updateProgress(state);
  } catch (e) {
    setStatus($('gen_status'), e.message, 'err');
    clearInterval(pollTimer); pollTimer = null;
    $('generate').disabled = false;
  }
}

$('generate').onclick = async () => {
  const profile = selectedProfile();
  const text = $('text').value.trim();
  if (!profile) { setStatus($('gen_status'), 'Pick or create a profile first.', 'err'); return; }
  if (!text)    { setStatus($('gen_status'), 'Enter some text.', 'err'); return; }

  $('video').classList.add('hidden');
  $('download_row').classList.add('hidden');
  $('bar_fill').style.width = '0%';
  $('stage_label').textContent = 'queued';
  setStatus($('gen_status'), 'Submitting job...');
  $('generate').disabled = true;

  try {
    const {job_id} = await jpost('/api/generate-video', {
      voice_id: profile.voice_id,
      avatar_id: profile.avatar_id,
      text,
    });
    setStatus($('gen_status'), `Job ${job_id} running...`);
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => pollJob(job_id), 1000);
  } catch (e) {
    setStatus($('gen_status'), e.message, 'err');
    $('generate').disabled = false;
  }
};

// ─── boot ───────────────────────────────────────────────────────────────────
loadProfiles();
updateProfileMode();
</script>
</body>
</html>
