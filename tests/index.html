<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Avatar_ML — Phase 0 demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #fafafa;
      --fg: #222;
      --muted: #666;
      --border: #ddd;
      --accent: #2563eb;
      --accent-fg: #fff;
      --ok: #16a34a;
      --err: #b91c1c;
      --bar-bg: #eef2ff;
      --bar-fill: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 820px; margin: 24px auto; padding: 0 16px;
      color: var(--fg); background: var(--bg);
    }
    h1 { margin-bottom: 4px; }
    .sub { color: var(--muted); margin-top: 0; font-size: 14px; }
    .card {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 16px 20px; margin: 16px 0; background: #fff;
    }
    .card h2 {
      margin: 0 0 12px 0; font-size: 16px; color: var(--accent);
    }
    .row { display: flex; gap: 10px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    label { font-size: 14px; }
    select, input[type=text], input[type=file], textarea, button {
      font: inherit; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px;
    }
    select, input[type=text] { min-width: 280px; }
    textarea { width: 100%; min-height: 70px; resize: vertical; }
    button {
      cursor: pointer; background: var(--accent); color: var(--accent-fg);
      border-color: var(--accent); padding: 8px 14px;
    }
    button[disabled] { opacity: 0.5; cursor: not-allowed; }
    button.ghost {
      background: #fff; color: var(--accent);
    }
    .status { font-size: 13px; color: var(--muted); margin-top: 8px; min-height: 18px; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); white-space: pre-wrap; font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
    .bar {
      height: 14px; background: var(--bar-bg); border-radius: 7px; overflow: hidden;
      margin-top: 6px;
    }
    .bar > div { height: 100%; background: var(--bar-fill); width: 0%; transition: width 0.3s; }
    .stage { font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
    video { width: 100%; max-width: 640px; background: #000; border-radius: 6px; margin-top: 12px; }
    .hidden { display: none; }
    .pill {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 11px; background: #eee; color: #444; margin-left: 4px;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>

<h1>Avatar_ML <span class="pill">Phase 0</span></h1>
<p class="sub">Type text, get a video of your cloned avatar saying it. Powered by OpenVoice V2 + MuseTalk on Colab.</p>

<!-- ─────────────────────────────────────────────────────────────── 1. Voice -->
<div class="card">
  <h2>1. Voice profile</h2>
  <div class="row">
    <label><input type="radio" name="voice_mode" value="existing" checked /> Use existing</label>
    <select id="voice_select"></select>
    <button class="ghost" id="voice_refresh" type="button">↻</button>
  </div>
  <div class="row">
    <label><input type="radio" name="voice_mode" value="upload" /> Upload new</label>
    <input type="file" id="voice_file" accept="audio/wav,audio/mpeg,audio/*" />
    <input type="text" id="voice_name" placeholder="Person name" />
    <button id="voice_create" type="button">Create voice profile</button>
  </div>
  <div class="status" id="voice_status"></div>
</div>

<!-- ─────────────────────────────────────────────────────────────── 2. Avatar -->
<div class="card">
  <h2>2. Avatar profile</h2>
  <div class="row">
    <label><input type="radio" name="avatar_mode" value="existing" checked /> Use existing</label>
    <select id="avatar_select"></select>
    <button class="ghost" id="avatar_refresh" type="button">↻</button>
  </div>
  <div class="row">
    <label><input type="radio" name="avatar_mode" value="upload" /> Upload new</label>
    <input type="file" id="avatar_file" accept="video/mp4,video/quicktime,video/*" />
    <input type="text" id="avatar_name" placeholder="Person name" />
    <button id="avatar_create" type="button">Create avatar profile</button>
  </div>
  <div class="status" id="avatar_status"></div>
</div>

<!-- ─────────────────────────────────────────────────────────────── 3. Generate -->
<div class="card">
  <h2>3. Generate video</h2>
  <textarea id="text" placeholder="Type what your avatar should say...">Hello, this is my AI avatar speaking in my cloned voice.</textarea>
  <div class="row">
    <button id="generate" type="button">Generate video</button>
    <span class="stage" id="stage_label">idle</span>
  </div>
  <div class="bar"><div id="bar_fill"></div></div>
  <div class="status" id="gen_status"></div>
  <video id="video" controls class="hidden"></video>
  <div class="row hidden" id="download_row">
    <a id="download_link" download>⬇ Download MP4</a>
  </div>
</div>

<script>
const API = location.origin;

// ─── helpers ────────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }
async function jget(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`GET ${path} -> ${r.status} ${await r.text()}`);
  return r.json();
}
async function jpost(path, body) {
  const r = await fetch(API + path, {
    method: 'POST',
    headers: {'content-type': 'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`POST ${path} -> ${r.status} ${await r.text()}`);
  return r.json();
}
async function jpostForm(path, formData) {
  const r = await fetch(API + path, {method: 'POST', body: formData});
  if (!r.ok) throw new Error(`POST ${path} -> ${r.status} ${await r.text()}`);
  return r.json();
}
function setStatus(el, msg, kind) {
  el.className = 'status' + (kind ? ' ' + kind : '');
  el.textContent = msg;
}
function modeOf(name) {
  return document.querySelector(`input[name=${name}]:checked`).value;
}

// ─── dropdown loaders ───────────────────────────────────────────────────────
async function loadVoices() {
  try {
    const rows = await jget('/api/voice-profiles');
    const sel = $('voice_select');
    sel.innerHTML = '';
    if (!rows.length) {
      const o = document.createElement('option');
      o.textContent = '(no voice profiles — upload new)';
      o.value = '';
      sel.appendChild(o);
      // Auto-switch to upload mode.
      document.querySelector('input[name=voice_mode][value=upload]').checked = true;
    } else {
      for (const r of rows) {
        const o = document.createElement('option');
        o.value = r.id;
        o.textContent = `${r.person_name} (${r.id})`;
        sel.appendChild(o);
      }
    }
  } catch (e) {
    setStatus($('voice_status'), e.message, 'err');
  }
}
async function loadAvatars() {
  try {
    const rows = await jget('/api/avatar-profiles');
    const sel = $('avatar_select');
    sel.innerHTML = '';
    if (!rows.length) {
      const o = document.createElement('option');
      o.textContent = '(no avatar profiles — upload new)';
      o.value = '';
      sel.appendChild(o);
      document.querySelector('input[name=avatar_mode][value=upload]').checked = true;
    } else {
      for (const r of rows) {
        const o = document.createElement('option');
        o.value = r.id;
        o.textContent = `${r.person_name} (${r.id})`;
        sel.appendChild(o);
      }
    }
  } catch (e) {
    setStatus($('avatar_status'), e.message, 'err');
  }
}

// ─── upload flows ───────────────────────────────────────────────────────────
$('voice_create').onclick = async () => {
  const f = $('voice_file').files[0];
  const name = $('voice_name').value.trim() || 'demo';
  if (!f) { setStatus($('voice_status'), 'Pick a .wav file first.', 'err'); return; }
  const fd = new FormData();
  fd.append('audio', f);
  fd.append('person_name', name);
  setStatus($('voice_status'), `Uploading ${f.name} → extracting embedding (Colab lazy-load can take ~40s on first call)...`);
  try {
    const r = await jpostForm('/api/voice-profiles', fd);
    setStatus($('voice_status'), `Created ${r.id}.`, 'ok');
    await loadVoices();
    $('voice_select').value = r.id;
    document.querySelector('input[name=voice_mode][value=existing]').checked = true;
  } catch (e) {
    setStatus($('voice_status'), e.message, 'err');
  }
};
$('voice_refresh').onclick = loadVoices;

$('avatar_create').onclick = async () => {
  const f = $('avatar_file').files[0];
  const name = $('avatar_name').value.trim() || 'demo';
  if (!f) { setStatus($('avatar_status'), 'Pick a .mp4 file first.', 'err'); return; }
  const fd = new FormData();
  fd.append('video', f);
  fd.append('person_name', name);
  setStatus($('avatar_status'), `Uploading ${f.name} → MuseTalk preprocessing (1-3 minutes)...`);
  try {
    const r = await jpostForm('/api/avatar-profiles', fd);
    setStatus($('avatar_status'), `Created ${r.id}.`, 'ok');
    await loadAvatars();
    $('avatar_select').value = r.id;
    document.querySelector('input[name=avatar_mode][value=existing]').checked = true;
  } catch (e) {
    setStatus($('avatar_status'), e.message, 'err');
  }
};
$('avatar_refresh').onclick = loadAvatars;

// ─── generate + progress polling ────────────────────────────────────────────
let pollTimer = null;

function selectedVoice() {
  return modeOf('voice_mode') === 'existing' ? $('voice_select').value : null;
}
function selectedAvatar() {
  return modeOf('avatar_mode') === 'existing' ? $('avatar_select').value : null;
}

function updateProgress(state) {
  $('stage_label').textContent =
    `${state.stage} ${state.frames_total ? `(${state.frames_done}/${state.frames_total} frames)` : ''} — ${state.elapsed_s}s`;
  $('bar_fill').style.width = state.progress + '%';

  if (state.stage === 'done') {
    setStatus($('gen_status'), `Done in ${state.elapsed_s}s.`, 'ok');
    const url = state.output_url;
    const vid = $('video');
    vid.src = url;
    vid.classList.remove('hidden');
    const dl = $('download_link');
    dl.href = url;
    dl.textContent = `⬇ Download MP4`;
    $('download_row').classList.remove('hidden');
    clearInterval(pollTimer); pollTimer = null;
    $('generate').disabled = false;
  } else if (state.stage === 'failed') {
    setStatus($('gen_status'), state.error || 'unknown error', 'err');
    clearInterval(pollTimer); pollTimer = null;
    $('generate').disabled = false;
  }
}

async function pollJob(jobId) {
  try {
    const state = await jget('/api/generate-video/' + jobId);
    updateProgress(state);
  } catch (e) {
    setStatus($('gen_status'), e.message, 'err');
    clearInterval(pollTimer); pollTimer = null;
    $('generate').disabled = false;
  }
}

$('generate').onclick = async () => {
  const voice_id = selectedVoice();
  const avatar_id = selectedAvatar();
  const text = $('text').value.trim();
  if (!voice_id) { setStatus($('gen_status'), 'Pick or create a voice profile first.', 'err'); return; }
  if (!avatar_id) { setStatus($('gen_status'), 'Pick or create an avatar profile first.', 'err'); return; }
  if (!text)      { setStatus($('gen_status'), 'Enter some text.', 'err'); return; }

  // Reset UI.
  $('video').classList.add('hidden');
  $('download_row').classList.add('hidden');
  $('bar_fill').style.width = '0%';
  $('stage_label').textContent = 'queued';
  setStatus($('gen_status'), 'Submitting job...');
  $('generate').disabled = true;

  try {
    const {job_id} = await jpost('/api/generate-video', {voice_id, avatar_id, text});
    setStatus($('gen_status'), `Job ${job_id} running...`);
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => pollJob(job_id), 1000);
  } catch (e) {
    setStatus($('gen_status'), e.message, 'err');
    $('generate').disabled = false;
  }
};

// ─── boot ───────────────────────────────────────────────────────────────────
loadVoices();
loadAvatars();
</script>
</body>
</html>
